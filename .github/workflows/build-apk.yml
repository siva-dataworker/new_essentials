name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
        
    - name: Flutter doctor
      run: flutter doctor -v
        
    - name: Get dependencies
      working-directory: ./otp_phone_auth
      run: |
        flutter clean
        flutter pub get
      
    - name: Build APK
      working-directory: ./otp_phone_auth
      run: flutter build apk --release --split-per-abi
      
    - name: Upload APK (arm64-v8a)
      uses: actions/upload-artifact@v4
      with:
        name: essential-homes-app-arm64
        path: otp_phone_auth/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        
    - name: Upload APK (armeabi-v7a)
      uses: actions/upload-artifact@v4
      with:
        name: essential-homes-app-arm32
        path: otp_phone_auth/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        
    - name: Upload APK (x86_64)
      uses: actions/upload-artifact@v4
      with:
        name: essential-homes-app-x64
        path: otp_phone_auth/build/app/outputs/flutter-apk/app-x86_64-release.apk
