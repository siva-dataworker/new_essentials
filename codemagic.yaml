workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up project
        script: |
          cd otp_phone_auth
      - name: Get Flutter packages
        script: |
          cd otp_phone_auth
          flutter packages pub get
      - name: Build APK
        script: |
          cd otp_phone_auth
          flutter build apk --release
    artifacts:
      - otp_phone_auth/build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
